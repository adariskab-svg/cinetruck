<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineTrack — Catalogue & suivi personnel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== MARQUEE HEADER ===== -->
<header class="marquee">
  <div class="sprocket-row" aria-hidden="true"></div>
  <div class="marquee-inner">
    <div class="brand">
      <span class="brand-mark">🎞</span>
      <h1>CINE<span>TRACK</span></h1>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="catalogue" role="tab" aria-selected="true">Catalogue</button>
      <button class="tab" data-tab="watchlist" role="tab" aria-selected="false">À voir <span class="count" id="count-watchlist">0</span></button>
      <button class="tab" data-tab="seen" role="tab" aria-selected="false">Déjà vu <span class="count" id="count-seen">0</span></button>
    </nav>

    <div class="search-window">
      <input type="search" id="search-input" placeholder="Chercher un titre…" autocomplete="off">
      <span class="search-icon">⌕</span>
    </div>
  </div>
  <div class="sprocket-row" aria-hidden="true"></div>
</header>

<!-- ===== FILTER BAR (ticket stubs) ===== -->
<div class="filter-bar" id="filter-bar">
  <div class="stub">
    <label for="filter-type">Type</label>
    <select id="filter-type">
      <option value="all">Tous</option>
      <option value="movie">Films</option>
      <option value="tv">Séries</option>
    </select>
  </div>
  <div class="stub">
    <label for="filter-genre">Genre</label>
    <select id="filter-genre">
      <option value="all">Tous les genres</option>
    </select>
  </div>
  <div class="stub">
    <label for="filter-year">Année</label>
    <select id="filter-year">
      <option value="all">Toutes</option>
    </select>
  </div>
  <div class="stub note-stub">
    <label for="filter-note">Note min. <span id="note-value">0</span></label>
    <input type="range" id="filter-note" min="0" max="9" step="1" value="0">
  </div>
  <div class="stub">
    <label for="filter-sort">Trier par</label>
    <select id="filter-sort">
      <option value="popularity">Popularité</option>
      <option value="note">Note</option>
      <option value="date">Date de sortie</option>
    </select>
  </div>
  <button class="reset-btn" id="reset-filters">Réinitialiser</button>
</div>

<!-- ===== STATUS / LOADING / API KEY BANNER ===== -->
<div id="status-banner" class="status-banner hidden"></div>

<!-- ===== MAIN CATALOGUE ===== -->
<main>
  <section id="results-meta" class="results-meta"></section>
  <div id="grid" class="grid" aria-live="polite"></div>
  <div id="empty-state" class="empty-state hidden">
    <p class="empty-title">Aucun résultat sur cette bobine.</p>
    <p class="empty-sub">Essayez un autre titre ou ajustez les filtres.</p>
  </div>
</main>

<!-- ===== DETAIL MODAL ===== -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
    <div id="modal-body" class="modal-body"><!-- injected --></div>
  </div>
</div>

<footer class="site-footer">
  <div class="sprocket-row" aria-hidden="true"></div>
  <p>CineTrack — projet pédagogique de groupe · Catalogue local, aucun compte requis · Aucune vidéo n'est diffusée sur ce site.</p>
</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
